services:

  ML:
    image: ml
    build:
      context: ./ML
      dockerfile: ML/Dokerfile

  backend:
    image: backend
    build:
      context: ./backend
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - ML

  frontend:
    image: frontend
    build:
      context: ./frontend
      dockerfile: backend/Dockerfile
    ports:
      - "8501:8501"
    depends_on:
      - backend